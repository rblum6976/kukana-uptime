services:
  kukana-uptime:
    build:
      context: .
    image: kukana-uptime:1.1.0
    container_name: kukana-uptime
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3333:3000"   # adjust to whatever your app uses
    volumes:
      - uptime-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - ALERT_FROM_EMAIL=uptime@kukana.local
    depends_on:
      - mailpit

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"

volumes:
  uptime-data: