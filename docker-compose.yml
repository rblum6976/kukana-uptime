services:
  kukana-uptime:
    image: kukana-uptime:1.1.0-amd64
    container_name: kukana-uptime
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3333:3000"   # adjust to whatever your app uses
    volumes:
      - uptime-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SMTP_HOST=smtp-relay
      - SMTP_PORT=25
      - ALERT_FROM_EMAIL=uptime@kukana.app
    depends_on:
      - smtp-relay

  smtp-relay:
    image: boky/postfix:latest
    container_name: smtp-relay
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RELAYHOST=${SMTP_RELAY_HOST}
      - RELAYHOST_USERNAME=${SMTP_RELAY_USERNAME}
      - RELAYHOST_PASSWORD=${SMTP_RELAY_PASSWORD}
      - ALLOWED_SENDER_DOMAINS=${SMTP_ALLOWED_SENDER_DOMAINS:-*}

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-uptime
    restart: unless-stopped
    command: tunnel run
    depends_on:
      - kukana-uptime
    env_file:
      - .env
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}

volumes:
  uptime-data: