version: "3.8"

services:
  kukana-uptime:
    image: kukana-uptime:1.0.0-amd64
    container_name: kukana-uptime
    restart: unless-stopped
    ports:
      - "3333:3000"   # adjust to whatever your app uses
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-uptime
    restart: unless-stopped
    command: tunnel run
    depends_on:
      - kukana-uptime
    environment:
      - TUNNEL_TOKEN=<TUNNEL_TOKEN>